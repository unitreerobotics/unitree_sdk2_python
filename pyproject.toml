[project]
name = "unitree_sdk2py"
version = "1.0.1"
description = "Unitree robot sdk version 2 for python"
readme = { file = "README.md", content-type = "text/markdown" }
requires-python = ">=3.9"
license = { text = "BSD-3-Clause" }
authors = [
  { name = "UnitreeRobotics", email = "unitree@unitree.com" }
]
dependencies = [
  "cyclonedds==0.11.0",
  "numpy",
  "opencv-python",
]

[project.urls]
"Source Code" = "https://github.com/unitreerobotics/unitree_sdk2_python"

[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["unitree_sdk2py", "unitree_sdk2py.*"]

# --- uv-specific settings ---
# If you've built cp312 wheels for cyclonedds, commit them under vendor/wheels/
# and uv will pick them up first during `uv sync`. Remove this block if you
# prefer only PyPI.
[tool.uv]
find-links = ["./vendor/wheels"]
# To force using only your wheels (no PyPI fallback), run: `uv sync --no-index`

